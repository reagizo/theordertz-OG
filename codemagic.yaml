version: 2.1
workflows:
  android-build:
    name: theordertz Android
    max_build_duration: 15
    instance_type: mac_mini_m1
    environment:
      node: latest
    scripts:
      - name: Install dependencies
        script: npm ci --prefer-offline
      - name: Build web app
        script: npm run build
      - name: Generate Capacitor index.html
        script: node scripts/generate-capacitor-index.js
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Setup Java 21
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 21)
          echo "JAVA_HOME=$JAVA_HOME" >> $CM_ENV
          echo "PATH=$JAVA_HOME/bin:$PATH" >> $CM_ENV
      - name: Build Android APK
        script: |
          export JAVA_HOME=$(/usr/libexec/java_home -v 21)
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/**/*.apk
    cache:
      cache_paths:
        - node_modules
        - $HOME/.gradle/caches
        - $HOME/.npm
