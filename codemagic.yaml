version: 2.1
workflows:
  android-build:
    name: theordertz Android
    max_build_duration: 15
    instance_type: linux_x2
    environment:
      node: latest
      java: 21
    scripts:
      - name: Install dependencies
        script: npm ci --prefer-offline
      - name: Build web app
        script: npm run build
      - name: Generate Capacitor index.html
        script: node scripts/generate-capacitor-index.js
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/**/*.apk
    cache:
      cache_paths:
        - node_modules
        - $HOME/.gradle/caches
        - $HOME/.npm
