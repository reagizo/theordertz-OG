<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Order – Service Interface Portal System</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f9b47d 0%, #f59ac2 50%, #c7a4f5 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .chevrons {
      width: 80px;
      margin: 0 auto 10px;
    }

    .chevrons div {
      width: 0;
      height: 0;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
      margin: -10px auto;
    }

    .chevrons .top { border-bottom: 25px solid #1e2a5c; }
    .chevrons .middle { border-bottom: 25px solid #e84c8b; }
    .chevrons .bottom { border-bottom: 25px solid #f47c2b; }

    h1 {
      font-family: "Brush Script MT", cursive;
      color: #1e2a5c;
      font-size: 2.2em;
      margin: 0;
    }

    .subtext {
      font-size: 0.9em;
      color: #e84c8b;
      letter-spacing: 1px;
    }

    .tagline {
      font-size: 0.8em;
      color: #f47c2b;
      letter-spacing: 1px;
    }

    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }

    .login-box h2 {
      color: #1e2a5c;
      margin-bottom: 10px;
    }

    .login-box p {
      color: #555;
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 0.9em;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: linear-gradient(90deg, #f47c2b, #e84c8b);
      color: #fff;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: linear-gradient(90deg, #ff9b4a, #f76aa8);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transform: translateY(-2px);
    }

    .links {
      margin-top: 15px;
      font-size: 0.85em;
      color: #555;
    }

    .links a {
      color: #e84c8b;
      text-decoration: none;
      margin: 0 5px;
    }

    .links a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 20px;
      font-size: 0.75em;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="chevrons">
      <div class="top"></div>
      <div class="middle"></div>
      <div class="bottom"></div>
    </div>
    <h1>The Order</h1>
    <div class="subtext">SERVICE COMPANY</div>
    <div class="tagline">SERVICE INTERFACE PORTAL SYSTEM</div>
  </div>

  <div class="login-box">
    <h2>Welcome back</h2>
    <p>Sign in to your account to continue</p>
    <form>
      <input type="email" placeholder="you@example.com" required />
      <input type="password" placeholder="••••••••" required />
      <button type="submit">Sign In →</button>
    </form>
    <div class="links">
      Don’t have an account?
      <a href="#">Register as Agent</a> |
      <a href="#">Register as Customer</a>
    </div>
  </div>

  <footer>© 2026 The Order Service Company. All rights reserved.</footer>
</body>
</html>
